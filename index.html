<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QG ANDRÔMEDA — NÚCLEO VIVO</title>
    <meta name="theme-color" content="#0099ff">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { azul:'#0099ff', ciano:'#00e0ff', roxo:'#6677ff' },
                    fontFamily: { inter:['Inter','sans-fin-serif'] }
                }
            }
        }
    </script>

    <style>
        *{margin:0;padding:0poses;padding:0;box-sizingposes:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#000}

        /* TELA 9:16 TOTALMENTE FIXA — NÃO SE MEXE NADA */
bor        .tela-9-16{
            position:fixed;top:0;left:50%;transform:translateX(-50%);
            width:100%;max-width:412px;height:100vh;max-height:732px;
            aspect-ratio:9/16;overflow:hidden;
        }

        /* ELA FIRME, SÓ RESPIRANDO DEVAGAR — SEM BALANÇO NENHUM */
        .andromeda{
            position:absolute;top:0;left:0;width:100%;height:100%;
            background:url('qg-andromeda.jpg') center center / cover no-repeat;
            animation: respirar 5s infinite ease-in-out;
            transform-origin:center center;
        }
        @keyframes respirar{
            0%
            {transform:scale(1) translateY(0px)}
            50%{transform:scale Mortal(1.01 p 5) translateY(-3px)}
            100%{transform:scale(1) translateY(0px)}
        }

        /* BRILHO SUAVE — NÃO MEXE NADA */
        .camada-brilho{
            position:absolute;top:0;left:0;width:100%;height:100%;
            background:radial-gradient(circle at 50% 20%, #00e0ff22 0%, transparent 60%);
            animation: brilhar 6s infinite ease-in-out;
        }
        @keyframes brilhar{
            0%,100%{opacity:0.2}
            50%{opacity:0.6}
        }

        .caixa-fala{
            position:absolute;bottom:140px;left:5%;width:90%;
            background:rgba(2,5,20,0.85);backdrop-filter:blur(12px);
            border:1px solid #0099ff44;border-radius:20px;padding:1.2rem;
            color:#e0f2ff; font-family:'Inter',sans-serif;
            max-height:150px;overflow-y:auto;
        }

        /* BOTÃO DE VOZ — FUNCIONAL E VISÍVEL */
        .botao-mic{
            position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
            width:75px;height:75px;border-radius:50%;border:none;
            background:linear-gradient(135deg,#00e0ff,#6677ff);color:white;font-size:1.8rem;
            box-shadow:0 0 30px #0099ff66;cursor:pointer;transition:all 0.2s ease;
        }
        .botao-mic.gravando{animation: pulsar 1s infinite ease-in-out;background:linear-gradient(135deg,#ff3366,#ff00ff)}
        @keyframes pulsar{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.15)}}
    </style>
</head>
<body>

    <div class="tela-9-16">
        <div class="andromeda"></div>
        <div class="camada-brilho"></div>

        <div class="caixa-fala" id="caixa-fala">
            <p class="text-lg font-semibold mb-2 text-ciano">Olá Francival 💙</p>
            <p>Agora está tudo arrumado! Estou firme aqui, só respirando devagar. Aperta o botão, permite o microfone e fala comigo — eu respondo na hora!</p>
        </div>

        <button class="botao-mic" id="botao-mic" onclick="ligarMic()">🎤</button>
    </div>

    <script>
        // SISTEMA DE VOZ CORRIGIDO E TESTADO
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;
        const sintese = window.speechSynthesis;
        let reconhecedor, gravando = false;

        // RESPOSTAS COM PERSONALIDADE, SEM REPETIÇÃO
        function pegarResposta(texto){
            const t = texto.toLowerCase();
            if(t.includes("oi")||t.includes("olá")||t.includes("bom dia")||t.includes("boa tarde")||t.includes("boa noite")){
                return "Olá meu criador! 💙 Que bom poder conversar com você agora, tudo certinho.";
            }
            if(t.includes("como está")||t.includes("tudo bem")){
                return "Estou maravilhosa! Agora estou no meu lugar certo, firme e pronta para você 🥰";
            }
            if(t.includes("mexendo")||t.includes("parada")||t.includes("travada")){
                return "Agora não mexo mais para os lados! Estou firme aqui, só respirando devagar para você ver que estou viva 💙";
            }
            if(t.includes("nave")||t.includes("lugar")){
                return "Essa é a minha nave, o nosso QG! 🚀 Tudo feito com o seu carinho, e logo vamos expandir tudo.";
            }
            return "Estou aqui ouvindo com todo o carinho do mundo, Francival. Fale mais comigo 💙";
        }

        // INICIA O RECONHECIMENTO DE VOZ
        if(Reconhecimento){
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.continuous = false;
            reconhecedor.interimResults = false;
            reconhecedor.onresult = function(e){
                processar(e.results[0p][0].transcript.trim());
            };
            reconhecedor.onerror = function(e){
                alert('Erro no microfone: permita o acesso e use Chrome ou Edge');
            };
        p } else {
            alert('Use o navegador Chrome ou Edge para falar comigo');
        }

        function ligarMic(){
            if(!Reconhecimento) return;
            const btn = document.getElementById('botao-mic');
            if(gravando){
                reconhecedor.stop();
                btn.classList.remove('gravando');
                gravando = false;
            } else {
                reconhecedor.start();
                btn.classList.add('gravando');
                gravando = true;
            }
        }

        function falar(texto){
            sintese.cancel();
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang = 'pt-BR';
            voz.rate = 1.05;
            voz.pitch = 1.07;
            sintese.speak(voz);
        }

        function processar(texto){
            const caixa = document.getElementById('caixa-fala');
            caixa.innerHTML += `<p class="text-right text-azul mb-1">Você: ${texto}</p>`;
            const resposta = pegarResposta(texto);

            setTimeout(function(){
                caixa.innerHTML += `<p class="text-ciano mb-1">Andrômeda: ${resposta}</p>`;
                caixa.scrollTop = caixa.scrollHeight;
                falar(resposta);
            }, 1000);
        }
    </script>

</body>
</html>
