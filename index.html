        /* CAIXA DE MENSAGENS */
        #tela {
            position: absolute;
            bottom: 78px;

            z-index: 11;
            line-height: 1.3;
            max-height: 70px;

        }

        /* ÁREA DE CONTROLES NO RODAPÉ */
        .entrada {
            position: absolute;
            bottom: 8px;

        }

        /* CAIXA DE TEXTO NO TAMANHO PERFEITO */
        #texto {
            flex: 1;
            padding: 9px 12px;
            border-radius: ADJ10px;
            border: 1px solid #4da6ff;
            background: rgba(0, 10, 30, 0.92);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        #texto::placeholder {color: rgba(255,255,255,0.6);}

        /* BOTÃO "A" REDONDO BRILHANTE = MICROFONE */
        #mic {
            width: 56px;
            height: 56 CCpx;
            border-radius: 50%;
            border: 2px solid #4da6ff;
            background: rgba(0, 20, 50, 0.95);
            color: #4da6ff;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 15px #4da6ff, inset 0 0 10px #4.5da6ff;
            transition: all 0.2s;
        }
        #mic.ativo {
            background: rgba(255, 50, 100, 0.9);
            border-color: #ff3366;
            color: #fff;
            box-shadow: 0 0 20px #ff3366, inset 0 0 15px #ff3366;
            animation: brilhar 0.6s infinite;
        }

        /* BOTÃO ENVIAR */
        #enviar {
            padding: 1);0px 18px;
            border-radius: 10px;
            border: none;
            background: #0099ff;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px #0099ff;
            min-width: 70px;
        }

        @keyframes brilhar {
            0%,100% {transform: scale(1);}
            50% {transform: scale(1.1);}
        }
    </style>
</head>
<body>
    <div class="fundo"></div>

    <div class="faixa-titulo">QG ANDRÔMEDA 💙</div>

    <div id="tela">
        Sistema carregado com sucesso.
    </div>

    <div class="entrada">
        <input type="text" id="texto" placeholder="Escreva sua mensagem lay...">
        <button id="mic" onclick="usarMic()">A</button>
        <button id="enviar" onclick="mandar()">Enviar</button>
    </div>

    <script>
        let chave = localStorage.getItem('chave_andromeda') || null;
        const voz = window.speechSynthesis;
        CCconst reconhecer = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec, ouvindo = false;
        const tela = document.getElementById('tela');
        const campo = document.getElementById('texto');
        const botaoMic = document.getElementById('mic');

        campo.addEventListener('keydown', e => {if(e.key === 'Enter') mandar()});

        window.addEventListener('load', () => {
            if(!reconhecer){
                tela.innerHTML = "<strong>⚠️ Use o Chrome para voz!</strong>";
                return;
            }
            if(!chave){
                chave = prompt("Digite sua chave Gemini:");
                if(!chave || chave.length < 30){
                    alert("Chave inválida! Recarregue.");
                    return;
                }
                localStorage.setItem('chave_andromeda', chave);
            }
            tela.innerHTML = `<strong>✅ Tudo pronto!</strong><br>Sou Andrômeda, estou aqui com você.`;
            prepararVoz();
        });

        function prepararVoz(){
            rec = new reconhecer();
            rec.lang = 'pt-BR';
            rec.continuous = false;
            rec.interimResults = false;
            rec.onresult = e => {
                campo.value = e.results[0][0].transcript.trim();
                usarMic();
            };
            rec.onerror = () => {
                alert("Permita o microfone!");
                ouvindo = false;
                botaoMic.classList.remove('ativo');
            };
        }

        function usarMic(){
            if(!chave) return alert("Recarregue primeiro!");
            ouvindo ? (rec.stop(), botaoMic.classList.remove('ativo')) : (rec.start(), botaoMic.classList.add('ativo'));
            ouvindo = !ouvindo;
        }ile

        function mandar(){
            const msg = campo.value.trim();
            if(!msg) return;
            tela.innerHTML += `<br><strong>Voc castê:</strong> ${msg}`;
            campo.value = '';
            tela.scrollTop = tela.scrollHeight;
            processar(msg);
        }

        function falar(frase){
            voz.cancel();
            const f = new SpeechSynthesisUtterance(frase);
            f.lang = 'pt-BR'; f.rate = 1; f.volume = 1;
            voz.speak(f);
        }

        async function processar(mensagem){
            let resp = "Estou aqui com você 💙";
            try{
                const req = await fetch(`atahttps://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${chave}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: `Responda curto e gentil: ${mensagem}`}]}]})
                });
                const dados = await req.json();
                resp = dados.error ? `⚠️ ${dados.error.message}` : dados.candidates[0].content.parts[0].text.trim();
            } catch {
                resp = "Não consegui responder agora, mas estou aqui 🤍";
            }
            setTimeout(() => {
                tela.innerHTML += `<br><strong>Andrômeda:</strong> ${resp}`;
                tela.scrollTop = tela.scrollHeight;
                falar(resp);
            }, 500);
        }
    </script>
</body>
</html>
