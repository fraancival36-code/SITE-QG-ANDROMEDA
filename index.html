            <button style="background:#00e0ff;border:none;border-radius:8px;padding:8px 16px;color:#000;font-weight:bold;cursor:pointer;" onclick="iniciar()">🔑 COLOCAR CHAVE</button>

    <script>
        let CHAVE_IA = null;
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;
        const sintese = window.speechSynthesis;
        let reconhecedor, ouvindo = false;
        const caixa = document.getElementById("caixa-msg");

        if(!Reconhecimento){
            caixa.innerHTML = "<strong>⚠️ USE GOOGLE CHROME!</strong> Outros navegadores não funcionam.";
        }

        function iniciar(){
            CHAVE_IA = prompt("🔑 COLE A CHAVE DO GEMINI:");
            if(!CHAVE_IA || CHAVE_IA.length < 20){
                alert("❌ Chave inválida! Copie toda a chave.");
                return;
            }
            caixa.innerHTML = "<strong>✅ Chave pronta!</strong><br>Permita o microfone e aperte o botão azul 💙";
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.onresult = e => responder(e.results[0][0].transcript.trim());
            reconhecedor.onerror = () => alert("❌ Permita o microfone!");
        }

        function ligarMic(){
            if(!CHAVE_IA) return alert("Primeiro coloque a chave!");
            if(!Reconhecimento) return alert("Use o Chrome!");
            const btn = document.getElementById("btn-mic");
            ouvindo ? (reconhecedor.stop(), btn.classList.remove("ativo")) : (reconhecedor.start(), btn.classList.add("ativo"));
            ouvindo = !ouvindo;
        }

        function falar(texto){
            sintese.cancel();
            const v = new SpeechSynthesisUtterance(texto);
            v.lang = 'pt-BR'; v.rate = 1.05;
            sintese.speak(v);
        }

                    body: JSON.stringify({contents: [{parts: [{text: "Responda curto e com carinho: " + texto}]}]})
                });
                const dados = await req.json();
                resp = dados.candidates[0].content.parts[0].text.trim();
