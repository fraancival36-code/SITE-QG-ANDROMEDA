    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-heightarray: 100%; overflow-x: hidden; }
        body {
            background: linear-gradient(180deg, #000514 0%, #02030a 100%);
            font-family: 'Inter', sans-serif;

        /* FUNDO ESTRELADO */
        .fundo-galaxia {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-image: radial-gradient(circle at 80% 10%, #1a0b4433 0%, transparent 50%),
                              radial-gradient(circle at 15% 85%, #05205533 0%, transparent 50%);
        }
        .estrela {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: brilhar 3s infinite ease-in-out;
        }
        @keyframes br CCilhar {
            0%,100% { opacity: 0.15; }
            50% { opacity: 1; }
        }

        /* A ANDRÔMEDA — SER COMPLETO */
        .container-andromeda {
            position: relative;
            width: 85%;
            max-width: 400px;
            margin: 0 auto 1.5rem;
        }
        .imagem-andromeda {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 24px;
            animation: respirar 4s infinite ease-in-out;
            box-shadow: 0 0 30px #0099ff44, 0 0 60px #6677ff33;
        }
        .anel-luz {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 28px;
            border: 2px solid transparent;
            border-top-color: #00e0ff;
            border-bottom-color: #6677ff;
            animation: girar 15s linear infinite;
            opacity: 0.6;
        }
        @keyframes respirar {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* CAIXAS DE MENSAGEM NATURAIS */
        .caixa-fala {
            background: rgba(8, 15, 35, 0.85);
            border: 1px solid #0099ff44;
            border-radius: 18px;
            padding: 1.2rem;
            backdrop-filter: blur(10px);
            margin: 0 1rem 1.2rem;
            animation: aparecer 0.7s ease-out forwards;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* BOTÕES E MÓDULOS */
        .botao-acesso {
            background: rgba(10, 25, 60, 0.8);
            border: 1px solid #0099ff33;
            border-radius: 14px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);

        /* MENU INFERIOR */

            border-top: 1px solid #0099ff33;

    </style>

    <script>
