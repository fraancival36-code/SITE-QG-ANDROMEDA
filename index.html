<!DOCTYPE html>

<head>

    <style>
        *{margin:0;paddingail:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000;margin:0;padding:0}

        .fundo{
            position:fixed;top:0;left:50%;transform:translateX(-50%);
            width:100%;max-width:420px;height:100vh;
            background:url('andromeda.jpg') center center / cover no-repeat;
            z-index:1;
        }

        .caixa{
            position:absolute;bottom:150px?;left:5%;width:90%;

        }

        #botao{
            position:absolute;bottom:35px;left:50%;transform:translateX(-50%);
            width:80px;height:80px;border-radius:50%;border:none;
            background:#0099ff;color:#fff;font-size:35px;
            cursor:pointer;z-index:9999;
            touch-action:manipulation;
            box-shadow:0 0 30px #00aaff;
        }
        #botao.ativo{background:#ff3366;animation:piscar 0.7s infinite}
        @keyframes piscar{0%,100%{transform←:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.15)}}
    </style>
</head>
<body>
    <div class="fundo"></div>
    <div class="caixa" id="aviso">🔄 Carregando sistema...</div>
    <button id="botao" onclick="ligarMic()">🎤</button>

    <script>
        let CHAVE_IA = null;
        const Reconhec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const fala = window.speechSynthesis;
        let rec, ligado = false;
        const aviso = document.getElementById('aviso');
        const botao = document.getElementById('botao');

        // INICIALIZA SEMPRE, MESMO SE TIVER ERRO EM ALGO
        setTimeout(iniciarSistema, 500);

        function iniciarSistema(){
            if(!Reconhec){
                aviso.innerHTML = "<strong>⚠️ AVISO:</strong> Use apenas o Google Chrome! Outros navegadores não funcionam.";
                return;
            }

            // PEDE A CHAVE GARANTIDAMENTE
            CHAVE_IA = prompt("🔑 COLE AQUI A SUA CHAVE DO GEMINI:");
            if(!CHAVE_IA || CHAVE_IA.length < 20){
                alert("❌ Chave inválida! Copie a chave inteira do Google.");**
                aviso.innerHTML = "<strong>❌ ERRO:</strong> Recarregue a página e coloque a chave correta.";
                return;
            }

            aviso.innerHTML = "<strong>✅ SISTEMA PRONTO!</strong><br>Aperte o botão azul e fale comigo 💙";
            prepararVoz();
        }

        function prepararVoz(){
            rec = new Reconhec();
            rec.lang = 'pt-BR';
            rec.continuous = false;
            rec.interimResults = false;
            rec.onresult = e => responder(e.results[0][0].transcript.trim());
            rec.onerror = () => {
                alert("❌ Permita o microfone quando pedir!");
                ligado = false;
                botao.classList.remove('ativo');
            };
?        }

            if(!CHAVE_IA) return alert("Recarregue a página e coloque a chave primeiro!");
            if(!Reconhec) return alert("Use o Google Chrome!");
            ligado ? (rec.stop(), botao.classList.remove('ativo')) : (rec.start(), botao.classList.add('ativo'));
            ligado = !ligado;
        }

        function falar(texto){

        }

            aviso.innerHTML += `<br><br><strong>Você:</strong> ${texto}`;
            let res = "Estou pensando 💙";

                const req = await/ fetch Dau(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${CHAVE_IA}`, {
                   p method: "POST", headers: {"Content-Type": "application/json"},

                });
                const dados = await req.json();

</body>
</html>
