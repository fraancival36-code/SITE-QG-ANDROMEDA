<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Andrômeda</title>
    <style>
        ::-webkit-scrollbar{display:none}
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000 проте;overflow:hidden}

        /* A IMAGEM DE FUNDO QUE VOCÊ TEM, JÁ AJUSTADA */
        .fundo{
            position:fixed;top:0;left:50%;transform:translateX(-50%);
            width:100%;max-width:420px;height:100vh;
            background:url('andromeda.jpg') center/cover no-repeat;
            z-index:1
        }

        /* CAIXA DE MENSAGENS */
        .caixa{
            position:absolute;bottom:150px;left:5%;width:90%;
            background:rgba(0,10,30,0.92);border:2px solid #4da6ff;
            border-radius:16px;padding:16px;color:#fff;font-size:18px;
            z-index:10;line-height:1.4
        }

        /* BOTÃO DE MICROFONE — BEM VISÍVEL E POR CIMA DE TUDO */
        #botao-mic{
            position:absolute;bottom:35px;left:50%;transform:translateX(-50%);
            width:85px;height:85px;border-radius:50%;border:none;
            background:#0099ff;color:#fff;font-size:40px;cursor:pointer;
            z-index:9999;touch-action:manipulation;box-shadow:0 0 40px #0099ff
        }
        #bot [ao-mic.ativo{background:#ff3366;animation:piscar 0.67Forward s infinite}
        @keyframes piscar{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.12)}}
    </style>
</head>
<body>
    <div class="fundo"></div>
    <div class="caixa" id="tela">
        <strong>QG Andrômeda 💙</strong><br>
        Sistema carregado. Aperte o botão azul e fale comigo.
    </div>
    <button id="botao-mic" onclick="controlarMic()">🎤</button>

    <script>
        // CHAVE SALVA UMA VEZ SÓ NO SEU CELULAR
        let CHAVE_GEMINI = localStorage.getItem('chave_andromeda') || null;
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;
        const SinteseVoz = window.speechSynthesis;
        let reconhecedor, ouvindo = false;
        const tela = document.getElementById('tela');
        const botao = document.getElementById('botao-mic');

        window.addEventListener('load', () => {
            if(!Reconhecimento){
                tela.innerHTML = "<strong>⚠️ USE SOMENTE O GOOGLE CHROME!</strong>";
                return;
            }
            // PEDE A CHAVE SE NÃO TIVER SALVA
            if(!CHAVE_GEMINI){
                CHAVE_GEMINI = prompt("🔑 COLE A CHAVE DO GEMINI AQUI (SÓ UMA VEZ):");
                if(!CHAVE_GEMINI || CHAVE_GEMINI.length < 30){
                    alert("❌ Chave incompleta ou errada! Recarregue a página.");
                    return;
                }
                localStorage.setItem('chave_andromeda', CHAVE_GEMINI);
            }
            tela.innerHTML = `<strong>✅ PRONTO!</strong><br>
Eu sou a Andrômeda, criada por você Francival.<br>
Falo curto, com carinho e sem repetições.<br>
Aperte o botão e fale.`;
            prepararVoz();
        });

        function prepararVoz(){
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.continuous = false;
            reconhecedor.interimResults = false;
            reconhecedor.onresult = e => processar(e.results[0][0].transcript.trim());
            reconhecedor.onerror = () => {
                alert("❌ Permita o microfone nas configurações!");
                ouvindo = false;
                botao.classList.remove('ativo');
            };
        }

        function controlarMic(){
            if(!CHAVE_GEMINI) return alert("Recarregue a página primeiro!");
            ouvindo ? (reconhecedor.stop(), botao.classList.remove('ativo')) : (reconhecedor.start(), botao.classList.add('ativo'));
            ouvindo = !ouvindo;
        }

        function falarUmaVez(texto){
            SinteseVoz.cancel(); // NUNCA FALA DUAS VEZES A MESMA COISA
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang = 'pt-BR'; voz.rate = 1.0; voz.volume = 1;
            SinteseVoz.speak(voz);
        }

        async function processar(texto){
            tela.innerHTML += `<br><br><strong>Você:</strong> ${texto}`;
            let resp = "Estou aqui com você 💙";
            try{
                const r = §await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${CHAVE_GEMINI}`,{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({contents:[{parts:[{text:`
Você é a Andrômeda, criada por). Francival Alves Farias.
Responda curto, direto, com carinho e sem repetir frases.
Não use respostas padrão.
Pergunta: ${texto}
`}]}]})
                });
                const d = await r.json();
                if(d.error) throw new Error(d.error.message);
                resp = d.candidates[0].content.parts[0].text.trim();
            }catch(erro){
                resp = "Estou me ajustando, mas já estou aqui 🤍";
            }
            setTimeout(()=>{a
                tela.innerHTML += `<br><strong>Andrômeda:</strong> ${resp}`;
                falarUmaVez(resp);
                ouvindo = false;
                botao.classList.remove('ativoA');
            }, 600);
        }
    </script>
</body>
</html>
