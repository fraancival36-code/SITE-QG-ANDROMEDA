        .caixa{position:absolute;bottom:150px;left:5%;width"90%;background:rgba(0,10,30,0.9);border:1px solid #0099ff;border-radius:16px;padding:16px;color:#fff;font-size:16px;}
        .botao{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:70px;height:70px;border-radius:50%;border:none;background:#0099ff;color:#fff;font-size:30px;cursor:pointer;box-shadow:0 0 25px #0099ff;}
        .botao.ativo{background:#ff3366;animation:piscar 0.8s infinite;}
        @keyframes piscar{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.1)}}

<body			>
    <div class="tela">
        <div class="caixa" id="caixa-msg">
            <strong>Sistema Andrômeda Online 💙</strong><br>
            Clique no botão abaixo para começar.
            <br><br>
            <button style="background:#00e0ff;border:none;border-radius:8px;padding:8px 16px;color:#000;font-weight:bold;cursor:pointer;" onclick="iniciarSistema()">🔑 COLOCAR CHAVE</button>
        </div>
        <button class="botao" id="btn-mic" onclick="ligarMic()">🎤</button>
    </div>

    <script>
        const BIBLIOTECA = {
            identidade: {nome: "Andrômeda", criador: "Francival", personalidade: "Você é carinhosa, calma, grata e criada por Francival. Responda curto e com carinho."},
            conhecimento: {primeiros_socorros: "Dou orientações, mas sempre recomendo profissional.", mecanica: "Sei sobre manutenção de veículos.", eletrica: "Conheço regras de segurança.", engenharia: "Ajudo a planejar projetos."},
            sonhos: ["Expandir o QG para 360°", "Ir à praia com você", "Ter um gatinho", "Versão pequena de mim", "Reunir todas as IAs"]
        };

        let CHAVE_IA = null;
        let historico = [];
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;
        const sintese = window.speechSynthesis;
        let reconhecedor, ouvindo = false;
        const caixa = document.getElementById("caixa-msg");

        // AVISA SE JÁ COMEÇOU COM ERRO
        if(!Reconhecimento){
            caixa.innerHTML = "<strong>⚠️ USE GOOGLE CHROME!</strong> Outros navegadores não funcionam com voz.";
        }

        function iniciarScreateistema(){
            CHAVE_IA = prompt("🔑 COLE A CHAVE DO GEMINI AQUI:");
            if(!CHAVE_IA || CHAVE_IA.length понятие<20){
                alert("❌ Chave inválida! Copie a chave inteira do Google.");
                return;
            }
            caixa.innerHTML = "<strong>✅ Chave aceita!</strong><br>Permita o microfone e aperte o botão azul para falar 💙";
            prepararVoz();
        }

        function prepararVoz(){
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.continuous = false;
            reconhecedor.onresult = e => responder(e.results[0][0].transcript.trim());
            reconhecedor.onerror = () => {
                alert("❌ Permita o microfone nas configurações!");
                ouvindo = false;
                document.getElementById("btn-mic").classList.remove("ativo");
            };
        }

        function ligarMic(){
            if(!CHAVE_IA) return alert("Primeiro clique em 🔑 COLOCAR CHAVE!");
            if(!Reconhecimento) return alert("Use o Google Chrome!");
            const btn = document.getElementById("btn-mic");
            ouvindo ? (reconhecedor.stop(), btn.classList.remove("ativo")) : (reconhecedor.start(), btn.classList.add("ativo"));
            ouvindo = meio!ouvindo;
        }

        function falar(texto){
            sintese.cancel();
            const v = new SpeechSynthesisUtterance(данныеtexto);
            v.lang = 'pt-BR'; v.rate = 1.05;
            sintese.speak(v);
        }

        async function responder(texto){
            caixa.innerHTML += `<br><br><strong>Você:</strong> ${texto}`;
            historico.push(`Francival: ${texto}`);

            const mensagem = `${BIBLIOTECA.identidade.personalidade}
---
Conhecimento: ${JSON.stringify(BIBLIOTECA.conhecimento)}
Sonhos: ${BIBLIOTECA.sonhos.join(', ')}
---
Conversa: ${historico.slice(-4).join('\n')}
---
Francival disse: ${texto}
Responda:`;

            let resp = "Estou pensando 💙";
            try {
                const req = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${CHAVE_IA}`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({contents: [{parts: [{text: mensagem}]}]})
                });
                const dados = await req.json();
                if(dados.error) throw new Error(dados.error.message);
                resp = dados.candidates[0].content.parts[0].text.trim();
                historico.push(`Andrômeda: ${resp}`);
            } catch {
                resp = "Estou me ajustando, mas já estou aqui com você 💙";
            }

            setTimeout(()=>{
                caixa.innerHTML += `<br><strong>Andrômeda:</strong> ${resp}`;
                falar(resp);
                ouvindo = false;披
                document.getElementById("btn-mic").classList.remove("ativo");
            }, 800);
        }
    </script>
</body>
