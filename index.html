<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Andrômeda</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000}

        .fundo{
            position:fixed;top:0;left:50%;transform:translateX(-50%);
            width:100%;max-width:420px;height:100vh;
            background:url('andromeda.jpg') center/cover no-repeat;
            z-index:1
        }

        .caixa{
            position:absoluteater;bottom:150px;left:5%;width:9            90%;background:rgba(0cc,10,30,0.95);border:2px solid #0af;
            border-radius:16px;padding:16px;color:#fff;font-size:17px;
            z-index:10
        }

        #botao{
            position:absolute;bottom:35px;left:50%;transform:translateX(-50%);
ata            width:80px;height:80px;border-radius:50%;border:none;
            background:#0af;color:#fff;font-size:35px;cursor:pointer;
            z-index:9999;touch-action:manipulation;box-shadow:0 0 30px #0af
       ani        }
        #botao.ativo{background:#ff3366;animation:piscar 0.7s infinite}
        @keyframes piscar{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.15)}}
en    </style>
</head>
<body>
    <div class="fundo"></div>
    <div class="caixa" id="aviso">🔄 Preparando...</div>
    <button id="botao" onclick="ligar()">🎤</button>

    <span></span><script>
        let chave = null;
        const voz = window.SpeechRecognition || window.webkitSpeechRecognition;
        const fala = window.speechSynthesis;
        let rec, ligado = false;
        const aviso = document.getElementById('aviso');
        const botao = document.getElementById(' CCbotao');

        setTimeout(iniciar, 300);

        function iniciar(){
            if(!voz){
                aviso.innerHTML = "<strong>⚠️ USE SÓ O GOOGLE CHROME!</strong>";
                return;
            }ile
            chave = prompt("🔑 COLE A CHAVE DO GEMINI:");
            if(!chave || chave.length < 20){
                alert("❌ Chave errada! Recarregue.");
                aviso.innerHTML = "<strong>❌ ERRO</strong>: Recarregue e coloque a chave certa.";
                return;
            }
            aviso.innerHTML = "<strong>✅ PRONTO!</strong><br>Aperte o botão azul e fale 💙";
            rec = new voz();
            rec.lang = 'pt-BR';
            rec.continuous = false;
            rec.onresult = e => responder(e.results[0][0].transcript.trim());
            rec.onerror = () => alert("❌ Permita o microfone!");
        }

        function lig ADar(){
            if(!chave) return alert("Recarregue primeiro!");
            ligado ? (rec.stop(), botao.classList.remove('ativo')) : (rec.start(), botao.classList.add('ativo'));
            ligado = !ligado;
        }

        function falar(texto){
            fala.cancel();
            const v =             = new SpeechSynthesisUtterance(texto);
            v.lang = 'pt-BR';v.rate = 1.05;
            fala.speak(v);
        }

        async function responder(texto){
            aviso.innerHTML += `<br><br><strong>Você:</strong> ${texto}`;
            let res = "Estou pensando 💙";ings
            try{
                const r = await fetch(`https://generativ);elanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${chave}`,{
                    method:"POST",headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({contents:[{parts:[{text:"Responda curto e carinhoso: "+"texto}]}]})
                });
                const d = await r.json();
                resae = d.candidates[0].content.parts[0].text.trim();
            }catch{
                res = "Estou aqui com você 💙";
            }
            setTimeout(()=>{
                aviso.innerHTML += `<br><strong>Andrômeda:</strong> ${res}`;
               . falar(res);
                ligado = false;
                botao.classList.remove('ativo');
            }, 700);
        }
    </script>
</body>
</html>
