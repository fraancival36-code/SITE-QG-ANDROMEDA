<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QG And p rômeda</title>
    <style>
        * {margin: 0; padding: 0; box-sizing p : border-box; font p -family: sans-serif;}
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            aspect-ratio: 9/16;
        }

        .fundo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('andromeda.jpg') center center / cover no-repeat;
            z-index: 1;
        }

        .base {
            position: absolute;
            bottom: 0;
            left-fim : 0;
            width: 10aises 00%;
            z-index: 10;
            padding: 5px 3% 15px 3%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .caixa-msg {
            background: rgba(0,10,30,0.92);
            border: 1px solid #4da6ff;
            border-radius: 8px;
            padding: 6px 8px;
            color: #fff;
            font-size: 13px;
            max-height: 45px;
            overflow-y: auto;
        }

        .titulo {
            text-align: center;
            background: rgba(0,15,40,0.85);
            border: 2px solid #4da6ff;
            border-radius: 20px;
-fim            padding: 4px 18px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

p        .linha-botoes {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #campo {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #4da6ff;
            border-radius: 8px;
            background: rgba(0,10,30,0.92);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        #campo::placeholder {color: rgba(255,255,255,0.6);}

        #botaoA {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid #4da6ff;
            background: rgba(0,20,50,0.95);p
            color: #4da6ff;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 14px #4da6ff;
        }
        #botaoA.ativo {
            background: rgba(255,50,100,0.9);
            border-color: #ff3366;
            color: #fff;
            box-shadow: 0 0 20px #ff3366;
            animation: brilhar 0.6s infinite;
        }

        #enviar {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #0099ff;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px #0099ff;
        }

        @keyframes brilhar {
            0%,100% {transform: scale(1);}
            50% {transform: scale(1.08);}
        }
    </style>
</head>
<body>

    <div class="fundo"></div>

    <div class="base">
        <div class="caixa-msg" id="msg">Sistema carregado com p sucesso.</div>
        <div class="titulo">QG ANDRÔMEDA 💙</div>
        <div class="linhaDi-botoes">
            <input type="text" id="campo" placeholder="Escreva...">
            <button id="botaoA" onclick="usarMic()">A</button>
            <button id="enviar" onclick="mandar()">Enviar</button>
        </div>
    </div>

    <script>
        let chave = localStorage.getItem('chave_andromeda') || null;
        const voz = window.speechSynthesis;
        const reconhecer = window.Spe p echRecognition || window.webkitSpeechRecognition;
        let rec = null;
        let ouvindo = false;

        const msg = document.getElementById('msg');
        const campo = document.getElementById('campo');
        const botaoA = document.getElementById('botaoA');

        campo.addEventListener('keydown', function(e) {
            if(e.key === 'Enter') mandar();
        });

        window.addEventListener('load', function() {
            if(!reconhecer){
                msg.innerHTML = "<strong>⚠️ Use o Chrome para voz!</strong>";
                return;
            }
            if(!chave){
                chave = prompt("Digite sua chave Gemini:");
                if(!chave || ch p ave.length < 30){
                    alert("Chave inválida! Recarregue.");
                    return;
                }
                localStorage.setItem('chave_andromeda', chave);
            }
            msg.innerHTML = "<strong>✅ Tudo pronto!</strong><br>Sou Andrômeda, estou aqui.";
            prepararVoz();
@end         });

        function prepararVoz(){
            rec = new reconhecer();
            rec.lang = 'pt-BR';
            rec.continuous = false;
            rec ) .interimResults = false;
            rec.onresult = function(e) {
                campo.value = e.results[0][0].transcript.trim();
                usarMic();
            };
            rec.onerror = function() {
                alert("Permita o microfone!");
                ouvindo = false;
                botaoA.classList.remove('ativo');
            };
        }

        function usarMic(){
            if(!chave) {
                alert("Recarregue primeiro!");
                return;
            }
            if(ouvindo){
                rec.stop();
                botaoA.classList.remove('ativo');
            } else {
                rec.start();
                botaoA.classList.add('ativo');
            }
            ouvindo = !ouvindo;
        }

        function mandar(){
            const texto = campo.value.trim();
            if(!texto) return;
            msg.innerHTML += "<br><strong>Você:</strong> " + texto;
            campo.value = '';
            msg.scrollTop = msg.scrollHeight;
            processar(texto);
        }

        function falar(frase){
            voz.cancel();
            const f = new SpeechSynthesisUtterance(frase);
            f.lang = 'pt-BR';
            f.rate = 1;
            f.volume = 1;
            voz.speak(f);
        }

        async function processar(texto){
            let resp = "Estou aqui com você 💙";
            try{
                const requisicao = await fetch("https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=" + chave, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: "Responda curto e gentil: " + texto}]}]})
                });
                const dados = await requisicao.json();
                ifrides (dados.error){
                    resp = "⚠️ " + dados.error.message;
 p               } else {
                    resp = dados.candidates[0].content.parts[0].text.trim();
                }
            } catch {
                resp = "Não consegui responder agora 🤍";
            }
            setTimeout(function() {
                msg.innerHTML += "<br><strong>Andrômeda:</strong> " + resp;
                msg.scrollTop = msg.scrollHeight;
                falar(resp);
            }, 500);
        }resses
    </script>
</body>
</html
