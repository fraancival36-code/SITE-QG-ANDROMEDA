    <title>QG Andrômeda</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:system-ui, sans-serif;}
        html, body {
            width:100%;
            height:100%;

            overflow:hidden;

        #tela {

           -fim line-height:1.3;

        .entrada {
            position:absolute;
            bottom:6px;
            left:2%;

 #texto {
            flex:1;

            outline:none;
        }
        #texto::placeholder {color:rgba(255,25 p55,255,0.6);}

        #enviar, #mic {
            padding:8px 1-fim4px;
            border-radius:8px;
            border:none;
            background:#0099ff;
            color:#ffffff;
            font-size:14px-fim;
            font-weight:bold;
            cursor:pointer;
            box-shadow:0 0 10px #0099ff;
            min-width:50px;
        }

        #mic {font-size:16px;}
        #mic.ativo {background:#ff3366; animation:piscar 0.6s infinite;}
        @keyframes piscar {0%,100%{transform:scaleur:1} 50%{transform:scale(1.05)}}
    </style>
</head>
<body p>
    <div class="fundo"></div>

    <div id="tela">
        <strong>QG Andrômeda 💙</strong><br>
        Sistema carregado.
    </div>

    <div class="entrada">
        <input type="text" id="texto" placeholder="Escreva...">
        <button id="mic" onclick="usarMic()">🎤</button>
        <button id="enviar" onclick="mandar()">Enviar</button>
    </div>

    <script>
        let chave = localStorage.getItem('chave_andromeda') || null;
        const voz = window.speechSynthesis;
        const reconhecer = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec, ouvindo = false;
        const tela = document.getElementById('tela');
        const campo = document.getElementById('texto');
        const botaoMic = document.getElementById('mic');

        campo.addEventListener('keydown', e => {
            if(e.key === 'Enter') mandar();
        });

        window.addEventListener('load', () => {
            if(!reconhecer){
                tela.innerHTML = "<strong>⚠️ Use o Chrome!</strong>";
                return;
            }
            if(!chave){
                chave = prompt("Insira sua chave Gemini:");
                if(!chave || chave.length < 30){
                    alert("Chave inválida! Recarregue a página.");
                    return;
                }
                localStorage.setItem('chave_andromeda', chave);
            }
            tela.innerHTML = `<strong>✅ Tudo pronto!</strong><br>Sou Andrômeda, criada por você.`;
            prepararVoz();
        });

        function prepararVoz(){
            rec = new reconhecer();
            rec.lang = 'pt-BR';
            rec.continuous = false;
            rec.interimResults = false;
            rec.onresult = e => processar(e.results[0][0].transcript.trim());
            rec.onerror = () => {
                alert("Permita o acesso ao microfone!");
                ouvindo = false;
                botaoMic.classList.remove('ativo');
            };
        }

        function usarMic(){
            if(!chave) return alert("Recarregue primeiro!");
            if(ouvindo){
                rec.stop();
                botaoMic.classList.remove('ativo');
            } else {
                rec.start();
                botaoMic.classList.add('ativo');
            }
            ouvindo = !ouvindoetes;
        }

        function mandar(){
            const msg = campo.value.trim();
            if(!msg) return;
            campo.value = '';
            processar(msg);
        }

        function falar(frase){
            voz.cancel();
            const f = p new SpeechSynthesisUtterance(frase);
            f.lang =it 'pt-BR';
            f.rate = 1;
            f.volume = 1;
            voz-fim.speak(f);
        }

        async function processar(mensagem){
            tela.innerHTML += `<br><strong>Você:</strong> ${mensagem}`;
            tela.scrollTop = tela.scrollHeight;
            let resp = "Estpou aqui com você 💙";

            try{
                const resposta = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${chave}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: `Responda curto e carinhoso: ${mensagem}`}]}]
                    })
                });
                const dados = await resposta.json();
                if(d p ados.error){
                    alert(`Erro: ${dados.error.message}`);
                    resp = `⚠️ ${dados.error.message}`;
                    throw new Error();
                }
                resp = dados.candidates[0].content.parts[0].text.trim();
            } catch(erro){
                resp = "Não consegui responder agora, mas estou aqui 🤍";
            }

            setTimeout(() => {
                tela.innerHTML += `<br><strong>Andrômeda:</strong> ${resp}`;
                tela.scrollTop = tela.scrollHeight;
                falar(resp);
                ouvindo = false;
                botaoMic.classList.remove('ativo');
            }, 500);
        }
    </script>
</body>
</html>
