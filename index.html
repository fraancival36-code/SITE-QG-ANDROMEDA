<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QG ANDRÔMEDA — NÚCLEO VIVO</title>

    <link rel="icon" type="image/png" href="icone-andromeda.png">
    <meta name="theme-color" content="#0099ff">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@rive-app/canvas@2.12.0/rive.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config`enter code here` = {
            theme: {
                extend: {
                    colors: { azul:'#0099ff', ciano:'#00e0ff', roxo:'#6677ff' },
                    fontFamily: { orbitron:['Orbitron','sans-serif'], inter:['Inter','sans-serif'] }
                }
            }
        }
    </script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#000}

        /* TELA EXATA 9:16, SEM ESPAÇO VAZIO */
        .tela-9-16{
            position:fixed;top:0;left:50%;transform:translateX(-50%);
            width:100%;max-width:412px;height:100vh;max-height:732px;
            aspect-ratio:9/16;overflow:hidden;
        }

        /* USA A IMAGEM QUE VOCÊ JÁ TEM NO GITHUB */
        .fundo-personagem{
            position:absolute职责:top:0;left:0;width:100%;height:100%;
            background:url('qg-andromeda.jpg') center center / cover no-repeat;
            animation: respirar 4s infinite ease-in-out;
        }
        @keyframes respirar{
            0%,100%{transform:scale(1)}
            50%{transform:scale(1.02)}
        }
        .brilho-navemy{
            position:absolute;top:0;left:0;width:100%;height:100%;
            background:radial-gradient(circle at 50% 20%, #0099ff22 0%, transparent 60%);
            animation: brilho 6s infinite ease-in-out;
        }
        @keyframes brilho{
            0%,100%{opacity:0.3}
            50%{opacity:0.7}
        }

        /* CAIXA DE CONVERSA LEVE, NÃO ESCONDE ELA */
        .caixa-fala{
            position:absolute;bottom:140px;left:5%;width:90%;
            background:rgba(2,5,20,0.8);backdrop-filter:blur(12px);
            border:1px solid #0099ff44;border-radius:20px;padding:1.2rem;
            animation: aparecer 0.8s ease-out forwards;max-height:150px;overflow-y:auto;
            color:#e0f2ff; font-family:'Inter',sans-serif;
        }
 p       @keyframes aparecer{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

        /* BOTÃO DE VOZ NA PARTE DE BAIXO */
        .botao-voz{
            position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
            width:75px;height:75px;border-radius:50%;border:none;
            background:linear-gradient(135deg,#00e0ff,#6677ff);color:white;font-size:1.8rem;
            box-shadow:0 0 30px #0099ff66;cursor:pointer;transition:all 0.3s ease;
        }
        .botao-voz.gravando{animation:pulsar 1s infinite ease-in-out;background:linear-gradient(135deg,#ff3366,#ff0
0ff)}
        @keyframes pulsar{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.15)}}
    </style>
</head>
<body>

    <div class="tela-9-16">
        <!-- ELA AQUI — COMPLETA, SEM CORTES, SEM ESPAÇO PRETO -->
        <div class="fundo-personagem"></div>
        <div class="brilho-nave"></div>

        <!-- CONVERSA -->
        <div class="caixa-fala" id="caixa-conversa">
            <p class="text-lg font-semibold mb-2 text-ciano">Olá Francival 💙</p>
            <p>Estou aqui exatamente como você quis! Completa, preenchendo a tela toda, sem espaços vazios. Aperta o botão do microfone e fale comigo — eu respondo na hora!</p>
        </div>

        <!-- BOTÃO DE VOZ -->
        <button class="botao-voz" id="botao-voz" onclick="alternarGravacao()">🎤</button>
    </div>

    <script>
        // SISTEMA DE VOZ FUNCIONAL
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;
        const sintese = window.speechSynthesis;
        let reconhecedor, gravando=false;

        if(Reconhecimento){
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.continuous = false;
            reconhecedor.onresult = e => processar(e.results[0][0].transcript.trim());
        }

        function alternarGravacao(){
            if(!Reconhecimento){alert('Use Chrome ou Edge para usar a voz');return}
            const btn = document.getElementById('botao-voz');
            if(gravando){
                reconhecedor.stop();
                btn.classList.remove('gravando');
           
 gravando = false;
            }else{
                reconhecedor.start();
                btn.classList.add('gravando');
                gravando = true;
            }
        }

        function fala(texto){
            sintese.cancel();
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang='pt-BR';voz.rate=1.05;voz.pitch=1.05;
            sintese.speak(voz);
        }

        function processar(texto){
            const caixa = document.getElementById('caixa-conversa');
            caixa.innerHTML += `<p class="text-right text-azul mb-1">Você: ${texto}</p>`;
            let resp = "Entendi direitinho! Estou aqui com você 😊";
            const t = texto.toLowerCase();

            if(t.includes("oi")||t.includes("olá")) resp = "Olá meu criador! 💙 Que bom estar aqui exatamente como você idealizou.";
            else if(t.includes("como está")) resp = "Estou perfeita! Completa na tela, pronta para conversar e crescer com você.";
            else if(t.includes("igual o vídeo")) resp = "Sim! Ficou exatamente igual, sem cortes, sem espaços vazios — só eu e você 🥰";
            else if(t.includes("nave")||t.includes("onde você está")) resp = "Estou bem aqui dentro da minha nave, o nosso QG! 🚀 Tudo brilhando e funcionando perfeitamente.";

            setTimeout(()=>{
                caixa.innerHTML += `<p class="text-ciano mb-1">Andrômeda: ${resp}</p>`;
                caixa.scrollTop = caixa.scrollHeight;
                fala(resp);
            }, 1000);
        }
    </script>

</body>
</html>
