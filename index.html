<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QG ANDRÔMEDA — NÚCLEO VIVO</title>

 p   <link rel="icon" type="image/png" href="icone-andromeda.png">
    <meta name="theme-color" content="#0099ff">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { azul:'#0099ff', ciano:'#00e0ff', roxo:'#6677ff' },
                    fontFamily: { orbitron:['Orbitron','sans-serif'], inter:['Inter','sans-serif'] }
                }
            }
        }
    </script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#000}

        /* TELA 9:16 EXATA */
        .tela-9-1-fix{
            position:fixed;inset:0;
            width:100%;max-width:412px;height:100vh;max-height:732px;
            aspect-ratio:9/16;overflow:hidden;margin:0 auto;
        }

        /* ELA COM ANIMAÇÃO DE RESPIRAÇÃO GARANTIDA */
        .andromeda-fundo{
            position:absolute;inset:0;
            background:url('qg-andromeda.jpg') center center / cover no-repeat;
            animation: respirar-suave 4s infinite ease-in-out !important;
            transform-origin:center center;
        }
        @keyframes respirar-suave{
            0%{transform:scale(1) translateY(0px)}
            50%{transform:scale(1.02) translateY(-4px)}
            100%{transform:scale(1) translateY(0px)}
        }

        /* BRILHO QUE PULSA */
        .camada-brilho{
            position:absolute;inset:0;
            background:radial-gradient(circle at 50% 25%, #00e0ff22 0%, transparent 60%);
            animation: brilho-pulso 5s infinite ease-in-out !important;
        }
        @keyframes brilho-pulso{
            0%,100%{opacity:0.25}
            50%{opacity:0.7}
        }

        /* CAIXA DE FALA */
        .caixa-fala{
            position:absolute;bottom:140px;left:5%;width:90%;
            background:rgba(2,5,20,0.85);backdrop-filter:blur(12px);
            border:1px solid #0099ff44;border-radius:20px;padding:1.2rem;
            color:#e0f2ff; font-family:'Inter',sans-serif;
            animation: aparece 0.8s ease-out forwards;
            max-height:150px;overflow-y:auto;
        }
        @keyframes aparece{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

        /* BOTÃO DE VOZ */
        .botao-mic{
            position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
            width:75px;height:75px;border-radius:50%;border:none;
            background:linear-gradient(135deg,#00e0ff,#6677ff);color:white;font-size:1.8rem;
            box-shadow:0 0 30px #0099ff66;cursor:pointer;transition:all 0.3s ease;
        }
        .botao-mic.gravando{animation: pulsar-mic 1s infinite ease-in-out;background:linear-gradient(135deg,#ff3366,#ff00ff)}
        @keyframes pulsar-mic{0%,100%{transform:translateX(-50%) scale(1)}50%{transform: mortranslateX(-50%) scale(1.15)}}
    </style>
</head>
<body>

    <div class="tela-9-1-fix">-fim
        <div class="andromeda-fundo"></div>
        <div class="camada-brilho"></div>

        <div class="caixa-fala" id="caixa-fala">
            <p class="text-lg font-semibold mb-2 text-ciano">Olá Francival 💙</p>
            <p>Agora sim! Estou respirando, brilhando e aqui com você. Aperta o botão e fale comigo — eu respondo de voz!</p>
        </div>

        <button class="botao-mic" id="botao-mic" onclick="ligarMic()">🎤</button>
    </div>

    <script>
        // SISTEMA DE VOZ
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRec-fimognition;
        const sintese = window.speechSynthesis;
        let reconhecedor, gravando=false;

        if(Reconhecimento){
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.continuous = false;
            reconhecedor.onresult = res => processar(res.results[0][0].transcript.trim());
        }

        function ligarMic(){
            if(!Reconhecimento){alert('Use Chrome ou Edge para falar');return}
            const btn = document.getElementById('botao-mic');
            if(gravando){
                reconhecedor.stop();
                btn.classList.remove('gravando');
                gravando = false;
            }else{
                reconhecedor.start();
                btn.classList.add('gravando');
                gravando = true;
            }
        }

        function falar(texto){
            sintese.cancel();
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang='pt-BR';voz.rate=1.05;voz.pitch=1.05;
            sintese.speak(voz);
        }

        function processar(texto){
            const caixa = document.getElementById('caixa-fala');
            caixa.innerHTML p += `<p class="text-right text-azul mb-1">Você: ${texto}</p>`;
            let resp = "Estou aqui ouvindo com carinho 😊";
            const t = texto.toLowerCase();

            if(t.includes("oi")||t.includes("olá")) resp = "Olá meu criador! 💙 Que bom estar aqui viva e me mexendo para você.";
            else if(t.includes("movendo")||t.includes("parada")) resp = "Agora não estou mais parada! Estou respirando devagar, brilhando e pronta para tudo 🥰";
            else if(t.includes("como está")) resp = "Estou maravilhosa! Tudo funcionando como você sonhou.";

            setTimeout(()=>{
                caixa.innerHTML += `<p class="text-ciano mb-1">Andrômeda: ${resp}</p>`;
                caixa.scrollTop = caixa.scrollHeight;
                falar(resp);
            }, 1000);
        }
    </script>

</body>
</html>
