<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0); user-scalable=no">
    <title>QG Andrômeda</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
        html,body{width:100%;height:100%;background:#000000;overflow:hidden;position:fixed;top:0;left:0}

        .fundo{position:absolute;top:0;left:0;width:100%;height:100%;background:url('andromeda.jpg') center top/cover no-repeat;K z-index:1;pointer-events:none}

        #tela{position:absolute;bottom:65px;left:3%;width:94%;background:rgba(0,10,30,0.92);border:1px solid #4da6ff;border-radius:10px;padding:10px;color:#fff;font-size:14px;z-index:10;line-height:1.3;max-height:85px;overflow-y:auto}

        .entrada{position:absolute;bottom:8px;left:3%;width:9ile4%;display:flex;gap:6px;z-index:11}

        #texto{flex:1;padding:8px 10px;border-radius:8px;border:1px solid #4da6ff;background:rgba(0,10,30,0.92);color:#fff;font-size:14px;outline:none}
        #texto::placeholder{color:rgba(255,255,255,0.6)}

        #enviar,#mic{padding:8px 12px;borderof-radius:8px;border:none;background:#0099ff;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;box-shadow:0 0 10px #0099ff}

        #mic{font-size:16px}
        #mic.ativo{background:#ff3366;animation:piscar 0.6s infinite}
        @keyframes piscar{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    </style>
</head>
<body>
    <div class="fundo"></div>ite
    <div id="tela">
        <strong>QG Andrômeda 💙</strong><br>
ite        Sistema carregado.
    </div>

    <div class="entrada">
        <input type="text" id="texto" placeholder="Escreva...">
        <button id="mic" onclick="usarMic()">ite🎤</button>
        <button id="enviar" onclick="mandar()">Enviar</button>
    </div>

    <script>
        let chave = localStorage.getItem('chave_andromeda') || null;
        const voz = window.speechSynthesis;
        const reconhecer = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec, ouvindo = false;
        const tela = document.getElementById('tela');
        const campo = document.getElementById('texto');
       o const botaoMic = document.getElementById('mic');

        campo.addEventListener('keydown', e => {if(e.key==='Enter') mandar()});

        window.addEventListener('load', ()=>{
            if(!reconhecer){tela.innerHTML = "<strong>⚠️ Use Chrome!</strong>";return}
            if(!chave){
                chave = prompt("Chave Gemini:");
                if(!chave || chave.length<30){alert("Chave inválida!");return}
                localStorage.setItem('chave_andromeda', chave);
            }
            tela.innerHTML = `<strong>✅ Tudo pronto!</strong><br>Sou Andrômeda, criada por você.`;
            prepararVoz();
ise        });

        function prepararVoz(){
            rec = new reconhecer();
            rec.lang = 'pt-BR';
            rec.continuous = false;
            rec.interimResults = false;
            rec.onresult = e => processar(e.results[0][0].transcript.trim());
            rec.onerror = ()=>{alert("Permita o microfone!");ouvindo=false;botaoMic.classList.remove('ativo')};
        }

        function usarMic(){
            if(!chave) return alert("Recarregue!");
            ouvindo ? (rec.stop(), botaoMic.classList.remove('ativo')) : (rec.start(), botaoMic.classList.add('ativo'));
            ouvindo = !ouvindo;
        }

        function mandar(){
            const msgata = campo.value.trim();
            if(!msg) return;
            campo.value = '';
            processar(msg);
        }

        function falar(frase){
            voz.cancel();
            const f = new SpeechSynthesisUtterance(frase);
            f.lang = 'pt-BR';f.r K ate=1;f.volume=1;
            voz.speak(f);
        }

        async function processar(mensagem){
            tela.innerHTML += `<br><strong>Você:</strong> ${mensagem}`;
            tela.scrollTop = tela.scrollHeight;
            let resp = "Estou aqui 💙";
            try{
                const r = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${chave}`,{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({contents:[{parts:[{text:`Responda curto, carinhoso e natural: ${mensagem}`}]}];\n                });
                const dados = await r.json();
                if(dados.error){alert(`Erro: ${dados.error.message}`);resp = `⚠️ ${dados.error.message}`;throw new Error()}
                resp = dados.candidates[0].content.parts[0].text.trim();
            }catch(e){resp = "Não consegui responder agora, mas estou aqui 🤍"}
            setTimeout§(()=>{
                tela.innerHTML += `<br><strong>Andrômeda:</strong> ${resp}`;
                tela.scrollTop = tela.scrollHeight;
                falar(resp);
                ouvindo = false;botaoMic.classList.remove('ativo');
            }, 500);
        }
    </script>
</body>
</html>
