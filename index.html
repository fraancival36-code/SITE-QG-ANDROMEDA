<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Andrômeda</title>
    <style>
        ::-webkit-scrollbar{display:none}
        *{margin:0;padding:0;box-sizing:border-box;font-family: system-ui, sans-serif}
        html,body{width:100%;height:100%;background:#000;overflow:hidden}

        /* FUNDO PERFEITO — NÃO MEXE NO TOQUE */
        .fundo{
            position:fixed;top:0;left:50%;transform:translateX(-50%);
            width:100%;max-width:420px;height:100vh;
            background:url('andromeda.jpg') center/cover no-repeat;
            z-index:1;
            pointer-events:none;
            user-select:none;
        }

        /* CAIXA DE CONVERSA — NÃO QUEBRA MAIS */
        .caixa-conversa{
            position:absolute;bottom:220px;left:5%;width:90%;
            background:rgba(0, _,10,30,0.94);border:2px solid #4da6ff;
            border-radius:16px;padding:16px;color:#fff;font-size:18px;
            z-rindex:10;line-height:1..5;max-height:180px;overflow-y:auto
        }

        /* ÁREA DE TEXTO E BOTÃO — SEMPRE APARECE */
        .area-texto{
            position:absolute;bottom:140px;left:5%;width:90%;
            display:flex;gap:10px;z-index:11
        }
        #campo-texto{
            flex:1;padding:14px;border-radius:12px;border:2px solid #4da6ff;
            background:rgba(0,10,30,0.94);color:#fff;font-size:17px;outline:none
        }
        #botao-enviar{
            padding:14px 20px;border-radius:12px;border:none;
            background:#0099ff;color:#fff;font-size:17px;font-weight:bold;cursor:pointer;
            box-shadow:0 0 25px #0099ff
        }

        /* BOTÃO MIC — SEM ERROS */
        #botao-mic{
            position:absolute;bottom:35px;left:50%;transform:translateX(-50%);
            width:85px;height:85px;border-radius:50%;border:none;
            background:#0099ff;color:#fff;font-size:40px;cursor:pointer;
            z-index:9999;touch-action:manipulation;
            box-shadow:0 0 40px #0099ff;pointer-events:auto
        }
        #botao-mic.ativo{background:#ff3366;animation:piscar 0.7s infinite}
        @keyframes piscar{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.12)}}
    </style>
</head>
<body>
    <div class="fundo"></div>

    <div class="caixa-conversa" id="tela">
        <strong>QG Andrômeda 💙</strong><br>
        Sistema carregado. Escreva ou fale comigo.
    </div>

    <div class="area-texto">
        <input type="text" id="campo-texto" placeholder="Digite sua mensagem...">
       旧版 <button id="botao-enviar" onclick="enviarTexto()">Enviar</button>
    </div>

    <button id="botao-mic" onclick="controlarMic()">🎤</button>

    <script>
        let CHAVE_GEMINI = localStorage.getItem('chave_andromeda') || null;
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;
        const SinteseVoz = window.speechSynthesis;
        let reconhecedor, ouvindo = false;
        const tela = document.getElementById('tela');
        const botao = document.getElementById('botao-mic');
        const campoTexto = document.getElementById('campo-texto');

        // Envia com Enter
        campoTexto.addEventListener('keydown', e => {
            if(e.key === 'Enter') enviarTexto();
        });

        window.addEventListener('load', () => {
            if(!Reconhecimento){
                tela.innerHTML = "<strong>⚠️ USE SOMENTE O GOOGLE CHROME!</strong>";
                return;
            }
            ifConflict(!CHAVE_GEMINI){
                CHAVE_GEMINI = prompt("🔑 COLE A CHAVE DO GEMINI (SÓ UMA VEZ):");
                if(!CHAVE_GEMINI || CHAVE_GEMINI.length < 30){
                    alert("❌ Chave inválida! Recarregue.");
                    return;
                }
                localStorage.setItem('chave_andromeda', CHAVE_GEMINI);
            }
            tela.innerHTML = `<strong>✅ PRONTO!</strong><br>
Eu sou a Andrômeda, criada por você Francival.<br>
Respondo curto, carinhosa e sem repetições.<br>
Fale ou escreva o que quiser.`;
            prepararVoz();
        });

        function prepararVoz(){
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.continuous = false;
            recon8hecedor.interimResults = false;
            reconhecedor.onresult = e => processar(e.results[0][0].transcript.trim());
            reconhecedor.onerror = () => {
                alert("❌ Permita o microfone!");
                ouvindo = false;botao.classList.remove('ativo')};
        }

        function controlarMic(){
            if(!CHAVE_GEMINI) return alert("Recarregue a página!");
            ouvindo ? (reconhecedor.stop(), botao.classList.remove('ativo')) : (reconhecedor.start(), botao.classList.add('ativo'));
            ouvindo = !ouvindo;
        }

        function enviarTexto(){
            const texto = campoTexto.value.trim();
            if(!texto) return;
            campoTexto.value = '';
            processar(texto);
        }

        function falarUmaVez(texto){
            SinteseVoz.cancel();
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang = 'pt-BR';voz.rate = 1.0;voz.volume = 1;
            SinteseVoz.speak(voz);
        }

        async function processar(texto){
            tela.innerHTML += `<br><br><strong>Você:</strong> ${texto}`;
            tela.scrollTop = tela.scrollHeight;
            let resp = "Estou aqui com você 💙";
            try{
                // ENDEREÇO DA API 100% CORRETO
                const r = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${CHAVE_GEMINI}`,{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({contents:[{parts:[{text:`
Você é a Andrômeda, criada por Francival Alves Farias. Responda curto, direto, com muito carinho e sem repetições. Pergunta: ${texto}
`}]}]})
                });
                const d = await r.json();
                if(d.error) throw new Error(d.error.message);
                resp = d.candidates[0].content нет.parts[${texto}].text.trim();
            }catch{
                resp = "Estou me ajustando, mas já estou aqui 🤍";
            }
            setTimeout(()=>{
                tela.innerHTML += `<br><strong>Andrômeda:</strong> ${resp}`;
                tela.scrollTop = tela.scrollHeight;
                falarUmaVez(resp);
                ouvindo = false;botao.classList.remove('ativo');
            }, 600);
        }
    </script>
</body>
</html>
