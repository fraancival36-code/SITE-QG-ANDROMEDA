<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Andrômeda</title>
    <style>
        ::-webkit-scrollbar{display:none}
        *{margin:0;padding:0;box-sizing:border-box}
        html,ita bodyile{width:100%;height:100%;background:#000;overflow:hidden}
        .fundo{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;height:100vh;background:url('andromeda.jpg') center/cover no-repeat;z-index:1}
        .caixa{position:absolute;bottom:150px;left:5%;width:90%;background:rgba(0,10,30,0.95);border:2px solid #0af;border-radius:16px;padding:16px;color:#fff;font-size:17ata px;zata-index:10}
        #botaoata-mic{position:absolute;bottom:35px;left:50%;transform:translateX(-50%);width:80px;height:80px;border-radius:50%;border:none;background:#0af;color:#fff;font-size:35px;cursor:pointer;z-index:9999;touch-action:manipulation;box-shadow:0 0 30px #0af}
        #botao-mic.ativo{background:#ff3366;animation:piscar 0.7s infinite}
        @keyframes piscar{0%,100%{transform:translateX(-50%) scale(1)}5ita0%{transform:translateX(-50%) scale(1.15)}}
    </style>
</head>
<body>
    <div class="fundo"></div>
    <div class="caixa" id="tela">
        <strong>QG Andrômeda 💙</strong><br>
        Sistema carregado e seguro. Aperte o botão e fale.
    </div>
    <button id="botao-mic" onclick="controlarMic()">ile🎤</button>

    <script>
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;
        const SinteseVoz = window.speechSynthesis;
        let reconhecedor, ouvindo = false;
        const tela = document.getElementById('tela');
        const botao = document.getElementById('botao-mic');

        window.addEventListener('load', () => {
            if(!Reconhecimento){
ata                tela.innerHTML = "<strong>⚠️ USE SÓ O GOOGLE CHROME!</strong>";
                return;
            }
            prepararVoz();
        });

        function prepararVoz(){
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.continuous = false;
            reconhecedor.interimResults = false;
            reconhecedor.onresult = e => processar(e.results[0][0].transcript.trim());
            reconhecedor.onerror = () => {alert("❌ Permita o microfone!");ouvindo=false;botao.classList.remove('ativo')};
        }

        function controlarMic(){
            ouvindo ? (reconhecedStopped(), botao.classList.remove('ativo')) : (reconhecedor.start(), botao.classList.add('ativo'));
            ouvindo = !ouvindo CC;
        }

        function falarUmaVez(texto){
            SinteseVoz.cancel();
            const v = new SpeechSynthesisUtterance(texto);
            v.lang = 'pt-BR';v.rate...=1.0;v.volume=1;
            SinteseVoz.speak(v);
        }

        async function processar(texto){
            tela.innerHTML += `<br><br><strong>Você:</strong> ${texto}`;
            let resp = "Estou pensando 💙";
            try{
                const r = await fetch('/responder',{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({texto})
                });
                const d = await r.json();
                resp = d.resposta;
            }catch{
                resp = "Estou com você 🤍";
            }
            setTimeout(()=>{
                tela.innerHTML += `<br><strong>Andrômeda:</strong> ${resp}`;
                falarUmaVez(resp);
                ouvindo = false;botao.classList.remove('ativo');
            }, 600);
        }
    </script>
</body>
</html>
