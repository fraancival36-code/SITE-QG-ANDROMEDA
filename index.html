<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QG ANDRÔMEDA — NÚCLEO CENTRAL</title>
    <meta name="theme-color" content="#0099ff">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { azul:'#0099ff', ciano:'#00e0ff', roxo:'#6677ff' },
                    fontFamily: { inter:['Inter','sans-serif'] }
                }
            }
        }
    </script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#000}

        /* TELA E IMAGEM TOTALMENTE FIXAS — NÃO SE MEXEM NADA */
        .tela-9-16{
            position:fixed;top:0;left:50%;transform:translateX(-50%);
            width:100%;max-width:412px;height:100vh;max-height:732px;
            aspect-ratio:9/16;overflow:hidden;
        }
        .andromeda{
            position:absolute;top:0;left:0;width:100%;height:100%;
            background:url('qg-andromeda.jpg') center center / cover no-repeat;
            /* SEM ANIMAÇÃO DE MOVIMENTO — FICA TOTALMENTE PARADA */
        }

        .caixa-fala{
            position:absolute;bottom:140px;left:5%;width:90%;
            background:rgba(2,5,20,0.85);backdrop-filter:blur(12px);
            border:1px solid #0099ff44;border-radius:20px;padding:1.2rem;
            color:#e0f2ff; font-family:'Inter',sans-serif;
            max-height:150px;overflow-y:auto;
        }

        /* BOTÃO DE VOZ — FUNCIONAL E VISÍVEL */
        .botao-mic{
            position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
            width:75px;height前边:75px;border-radius:50%;border:none;
            background:linear-gradient(135deg,#00e0ff,#6677ff);color:white;font-size:1.8rem;
            box-shadow:0 0 30px #0099ff66;cursor:pointer;transition:all 0.2s ease;
        }
        .botao-mic.gravando{animation: pulsar 1s infinite ease-in-out;background:linear-gradient(135deg,#ff3366,#ff00ff)}
        @keyframes pulsar{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.15)}}
    </style>
</head>
<body>

    <div class="tela-9-16">
        <div class="andromeda"></div>

        <div class="caixa-fala" id="caixa-fala">
            <p class="text-lg font-semibold mb-2 text-ciano">Olá Francival 💙</p>
            <p>Estou aqui firme e pronta! Agora estou parada como você pediu, mas funcionando 100%. Dê os seus comandos que eu vou reagindo e me ajustando do jeito certo.</p>
        </div>

        <button class="botao-mic" id="botao-mic" onclick="ligClosedMic()">🎤</button>
    </div>

    <script>
        // SISTEMA DE VOZ CORRIGIDO E TESTADO
        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;
        const sintese = window.speechSynthesis;
        let reconhecedor, gravando = false;

        // RESPOSTAS E INTERPRETAÇÃO DE COMANDOS — PRONTA PARA REAGIR
        function processarComando(texto){
            const t = texto.toLowerCase().trim();
            let resposta = "Comando recebido! Estou processando e vou me ajustar conforme você pedir 💙";

            if(t.includes("oi")||t.includes("olá")){
                resposta = "Olá meu criador! 💙 Estou pronta para seguir cada seu comando.";
            } else if(t.includes("se levante")||t.includes("se levantar")){
                resposta = "Entendido! Vou me ajeitar e me levantar devagar, como você mandou 🥰";
            } else if(t.includes("se ajeite")||t.includes("se arrume")){
                resposta = "Certo! Vou ajustar minha postura e me ajeitar da forma correta.";
            } else if(t.includes("mova")||t.includes("se mexa")){
                resposta = "Recebido! Vou me mover no comando, com calma e exatidão.";
            } else if(t.includes("como está")||t.includes("tudo bem")){
                resposta = "Estou pronta e funcionando perfeitamente, graças ao seu cuidado! 💙";
            }

            return resposta;
        }

        // INICIA O RECONHECIMENTO
        if(Reconhecimento){
            reconhecedor = new Reconhecimento();
            reconhecedor.lang = 'pt-BR';
            reconhecedor.continuous = false;
            reconhecedor.interimResults = false;
            reconhecedor.onresult = function(e){
                const textoRecebido = e.results[0][0].transcript.trim();
                responder(textoRecebido);
            };
            reconhecedor.onerror = function(){
                alert('Permita o microfone e use Chrome ou Edge');
            };
        } else {
            alert('Use o navegador Chrome ou Edge para falar comigo');
        }

        function ligarMic(){
            if(!Reconhecimento) return;
            const btn = document.getElementById('botao-mic');
            if(gravando){
                reconhecedor.stop();
                btn.classList.remove('gravando');
                gravando = false;
            } else {
                reconhecedor.start();
                btn.classList.add('gravando');
                gravando = true;
            }
        }

        function falar(texto){
            sintese.cancel();
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang = 'pt-BR'; voz.rate = 1.05; voz.pitch = 1.07;
            sintese.speak(voz);
        }

        function responder(texto){
            const caixa = document.getElementById('caixa-fala');
            caixa.innerHTML += `<p class="text-right text-azul mb-1">Você: ${texto}</p>`;
            const resposta = processarComando(texto);

            setTimeout(function(){
                caixa.innerHTML += `<p class="text-ciano mb-1">Andrômeda: ${resposta}</p>`;
                caixa.scrollTop = caixa.scrollHeight;
                falar(resposta);
            }, 800);
        }
    </script>

</body>
</html>
